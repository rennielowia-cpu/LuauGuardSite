<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuauGuard | Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #050505;
            --text: #ffffff;
            --muted: #a1a1aa;
            --card: #111111;
            --border: #27272a;
        }

        body, html {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 90%);
        }

        @media (pointer: fine) {
            body, button, div {
                cursor: none;
            }
        }

        #cursor {
            position: fixed;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
            transform: translate(-50%, -50%);
        }

        #cursor.hover {
            transform: translate(-50%, -50%) scale(4);
            background: rgba(255,255,255,0.15);
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        .typing {
            display: flex;
            gap: 2px;
        }

        .char {
            font-size: clamp(2.5rem, 12vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(180deg, #fff, #b0b0b8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            opacity: 0;
            filter: blur(8px);
            transform: translateY(20px);
            animation: fadeUp 0.35s forwards;
            animation-delay: calc(var(--i) * 0.07s);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0);
            }
        }

        #loader.glow .typing {
            text-shadow: 0 0 12px rgba(255,255,255,0.4);
        }

        #main {
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 2rem;
            transform: scale(0.96) translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
        }

        #main.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .container {
            max-width: 680px;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
            background: linear-gradient(180deg, #fff, #c0c0ca);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .desc {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--muted);
            margin-bottom: 3rem;
        }

        .desc span {
            color: white;
            font-weight: 500;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }

        .card-header {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .progress-wrap {
            width: 100%;
            height: 4px;
            background: #27272a;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress {
            height: 100%;
            background: white;
            width: 0%;
            transition: width 1.5s ease;
        }

        .details {
            display: flex;
            justify-content: space-between;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .eta {
            color: white;
            font-weight: 500;
        }

        .audio-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(17,17,17,0.8);
            border: 1px solid var(--border);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            cursor: pointer;
        }

        .audio-btn:hover {
            background: #222;
            transform: scale(1.05);
        }

        .audio-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        @media (max-width: 560px) {
            .card {
                transform: none !important;
            }
            .audio-btn {
                width: 40px;
                height: 40px;
                bottom: 16px;
                right: 16px;
            }
            body, button {
                cursor: auto;
            }
            #cursor {
                display: none;
            }
        }
    </style>
</head>
<body>

<div id="cursor"></div>

<div id="loader">
    <div class="typing" id="typing"></div>
</div>

<div id="main">
    <div class="container">
        <h1>LuauGuard</h1>
        <p class="desc">
            The next generation private obfuscator for Roblox Luau.<br>
            The next Luraph. <span>LuauGuard Team Forever.</span>
        </p>
        <div class="card" id="card">
            <div class="card-header">In development</div>
            <div class="progress-wrap">
                <div class="progress" id="progress"></div>
            </div>
            <div class="details">
                <span>Maintenance</span>
                <span class="eta">~ 4 Weeks</span>
            </div>
        </div>
    </div>
</div>

<audio id="audio" loop preload="none">
    <source src="https://cdn.pixabay.com/download/audio/2022/05/16/audio_276a09ca29.mp3?filename=crickets-and-insects-in-the-night-9092.mp3" type="audio/mpeg">
</audio>

<button class="audio-btn" id="audioBtn">
    <svg viewBox="0 0 24 24" id="iconMute">
        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
    <svg viewBox="0 0 24 24" id="iconPlay" style="display:none">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
</button>

<script>
    (function() {
        const cursor = document.getElementById('cursor');
        if (cursor && window.matchMedia('(pointer: fine)').matches) {
            let mx = 0, my = 0, cx = 0, cy = 0;
            document.addEventListener('mousemove', (e) => {
                mx = e.clientX;
                my = e.clientY;
            });
            function animate() {
                cx += (mx - cx) * 0.25;
                cy += (my - cy) * 0.25;
                cursor.style.left = cx + 'px';
                cursor.style.top = cy + 'px';
                requestAnimationFrame(animate);
            }
            animate();
            
            const hoverTargets = document.querySelectorAll('.card, .audio-btn');
            hoverTargets.forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
            });
        }

        const typingContainer = document.getElementById('typing');
        const text = 'LuauGuard';
        typingContainer.innerHTML = '';
        text.split('').forEach((ch, i) => {
            const span = document.createElement('span');
            span.textContent = ch;
            span.className = 'char';
            span.style.setProperty('--i', i);
            typingContainer.appendChild(span);
        });

        const loader = document.getElementById('loader');
        const mainEl = document.getElementById('main');
        const progressBar = document.getElementById('progress');
        
        const typingDuration = text.length * 70 + 400;
        setTimeout(() => {
            loader.classList.add('glow');
        }, typingDuration - 200);
        
        setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 800);
            mainEl.classList.add('visible');
            setTimeout(() => {
                progressBar.style.width = '15%';
            }, 500);
        }, typingDuration + 200);

        const card = document.getElementById('card');
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        
        if (card && !isTouch) {
            let targetX = 0, targetY = 0, curX = 0, curY = 0;
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const cx = rect.width / 2;
                const cy = rect.height / 2;
                targetY = ((x - cx) / cx) * 8;
                targetX = ((y - cy) / cy) * -6;
                card.style.transition = 'none';
            });
            card.addEventListener('mouseleave', () => {
                targetX = 0;
                targetY = 0;
                card.style.transition = 'transform 0.4s ease';
                card.style.boxShadow = '';
                card.style.borderColor = '';
            });
            function update3d() {
                curX += (targetX - curX) * 0.15;
                curY += (targetY - curY) * 0.15;
                card.style.transform = `perspective(800px) rotateX(${curX}deg) rotateY(${curY}deg) scale3d(1.01, 1.01, 1)`;
                requestAnimationFrame(update3d);
            }
            update3d();
        }

        const audio = document.getElementById('audio');
        const btn = document.getElementById('audioBtn');
        const muteIcon = document.getElementById('iconMute');
        const playIcon = document.getElementById('iconPlay');
        
        audio.volume = 0.35;
        
        let audioStarted = false;
        function tryAutoPlay() {
            audio.play().then(() => {
                audioStarted = true;
                if (muteIcon && playIcon) {
                    muteIcon.style.display = 'none';
                    playIcon.style.display = 'block';
                }
            }).catch(() => {});
            document.removeEventListener('click', tryAutoPlay);
            document.removeEventListener('touchstart', tryAutoPlay);
        }
        
        document.addEventListener('click', tryAutoPlay);
        document.addEventListener('touchstart', tryAutoPlay);
        
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (audio.paused) {
                audio.play();
                muteIcon.style.display = 'none';
                playIcon.style.display = 'block';
            } else {
                audio.pause();
                muteIcon.style.display = 'block';
                playIcon.style.display = 'none';
            }
        });
    })();
</script>
</body>
</html>
